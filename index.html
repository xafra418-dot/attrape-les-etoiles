<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⭐ Attrape les Étoiles ⭐</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    text-align:center;
    background:linear-gradient(#001d3d,#003566,#000814);
    color:white;
}

h1{
    margin-top:20px;
}

#info{
    font-size:22px;
    margin:15px;
}

#game{
    width:90%;
    max-width:900px;
    height:500px;
    margin:auto;
    border:3px solid white;
    border-radius:15px;
    position:relative;
    overflow:hidden;
    background:rgba(255,255,255,0.08);
}

.star{
    position:absolute;
    font-size:45px;
    cursor:pointer;
    transition:transform .2s;

.star:hover{
    transform:scale(1.3);
}

button{
    margin-top:20px;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:gold;
    cursor:pointer;
    display:none;
}

button:hover{
    background:orange;
}
</style>
</head>

<body>

<h1>⭐ Attrape les Étoiles ⭐</h1>

<div id="info">
Score : <span id="score">0</span> |
Temps : <span id="time">120</span>s |
Record : <span id="best">0</span>
</div>

<div id="game"></div> 
<button id="restart">🔄 Rejouer</button>
<script>
let score = 0;
let temps = 120;
let meilleur = localStorage.getItem("record") || 0;

document.getElementById("best").textContent = meilleur;

const game = document.getElementById("game");
const scoreTxt = document.getElementById("score");
const timeTxt = document.getElementById("time");
const restart = document.getElementById("restart");

function creerEtoile(){
    const etoile = document.createElement("div");
    etoile.className = "star";
    etoile.innerHTML = "⭐";

    etoile.style.left = Math.random()*(game.clientWidth-50)+"px";
    etoile.style.top = Math.random()*(game.clientHeight-50)+"px";

    etoile.onclick = function(){
        score++;
        scoreTxt.textContent = score;
        etoile.remove();

        if(score > meilleur){
            meilleur = score;
            localStorage.setItem("record", meilleur);
            document.getElementById("best").textContent = meilleur;
        }
    };

    game.appendChild(etoile);

    setTimeout(()=>{
        if(etoile.parentNode){
            etoile.remove();
        }
    },1200);
}

const apparition = setInterval(creerEtoile,600);

const chrono = setInterval(()>{
    temps--;
    timeTxt.textContent = temps;
   if(temps <= 0){
        clearInterval(chrono);
        clearInterval(apparition);

        alert("🎉 Partie terminée !\n\nTon score est : " + score);

        restart.style.display = "inline-block";
    }

},1000);

restart.onclick = function()
{
    score =0;
    temps=120

    scoreTxt.textContent=score;
    timeTxt.textContent=temps;
    restart.style.display="none";
     apparition=
setInterval(creerEtoile, 700);
    const chrono =setInterval(() => {
        temps --;
        timeTxt.textContent=
temps;
        if (temps<= 0)
clearInterval(chrono);
clearInterval(apparition);
        alert("🎉 Partie terminée !\n\nTon score est : " + score);
restart.style.display="inline-block";}
    } , 1000);
    };


    location.reload();
};
</script>

</body>
</html>

<button id="restart">🔄 Rejouer</button>
